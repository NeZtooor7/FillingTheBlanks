{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LingoFill</title>
    <link rel="stylesheet" href="{% static 'exercises/styles.css' %}">
</head>
<body>
    <main class="page">
        <div class="top-bar">
            <div class="top-bar-control">
                <span class="top-bar-label" data-i18n="interfaceLanguageLabel">
                    Interface language
                </span>

                <div class="language-dropdown">
                    <button id="language-toggle" type="button" class="language-toggle" aria-haspopup="true" aria-expanded="false">
                        <img id="selected-language-flag" src="{% static 'exercises/flags/en.svg' %}" alt="English" class="flag-icon">
                        <span id="selected-language-label">English</span>
                    </button>

                    <div id="language-menu" class="language-menu hidden">
                        <button type="button" class="language-option" data-lang="es" data-label="Español" data-flag="{% static 'exercises/flags/es.svg' %}">
                            <img src="{% static 'exercises/flags/es.svg' %}" alt="Español" class="flag-icon">
                            <span>Español</span>
                        </button>

                        <button type="button" class="language-option" data-lang="en" data-label="English" data-flag="{% static 'exercises/flags/en.svg' %}">
                            <img src="{% static 'exercises/flags/en.svg' %}" alt="English" class="flag-icon">
                            <span>English</span>
                        </button>

                        <button type="button" class="language-option" data-lang="de" data-label="Deutsch" data-flag="{% static 'exercises/flags/de.svg' %}">
                            <img src="{% static 'exercises/flags/de.svg' %}" alt="Deutsch" class="flag-icon">
                            <span>Deutsch</span>
                        </button>

                        <button type="button" class="language-option" data-lang="ja" data-label="日本語" data-flag="{% static 'exercises/flags/ja.svg' %}">
                            <img src="{% static 'exercises/flags/ja.svg' %}" alt="日本語" class="flag-icon">
                            <span>日本語</span>
                        </button>

                        <button type="button" class="language-option" data-lang="hi" data-label="हिन्दी" data-flag="{% static 'exercises/flags/hi.svg' %}">
                            <img src="{% static 'exercises/flags/hi.svg' %}" alt="हिन्दी" class="flag-icon">
                            <span>हिन्दी</span>
                        </button>

                        <button type="button" class="language-option" data-lang="ro" data-label="Română" data-flag="{% static 'exercises/flags/ro.svg' %}">
                            <img src="{% static 'exercises/flags/ro.svg' %}" alt="Română" class="flag-icon">
                            <span>Română</span>
                        </button>

                        <button type="button" class="language-option" data-lang="it" data-label="Italiano" data-flag="{% static 'exercises/flags/it.svg' %}">
                            <img src="{% static 'exercises/flags/it.svg' %}" alt="Italiano" class="flag-icon">
                            <span>Italiano</span>
                        </button>

                        <button type="button" class="language-option" data-lang="pt" data-label="Português" data-flag="{% static 'exercises/flags/pt.svg' %}">
                            <img src="{% static 'exercises/flags/pt.svg' %}" alt="Português" class="flag-icon">
                            <span>Português</span>
                        </button>
                    </div>
                </div>

                <button id="dark-mode-toggle" type="button" class="theme-toggle">
                    🌙 Dark mode
                </button>
            </div>
        </div>
        <section class="card">
            {% block content %}{% endblock %}
        </section>
    </main>
    <script src="{% static 'exercises/theme.js' %}"></script>
    <script src="{% static 'exercises/i18n.js' %}"></script>
    <script src="{% static 'exercises/multiselect.js' %}"></script>
    <script src="{% static 'exercises/learning_language.js' %}"></script>
</body>
</html>
